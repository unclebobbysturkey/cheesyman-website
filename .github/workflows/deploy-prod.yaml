name: Deploy to Website (PROD)

on:
  push:
    branches:
      - main
    paths:
      - 'website_prod/nginx/html/**'
      - 'website_prod/node/**'
      - 'website_prod/nginx/*.conf'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2  # needed so git diff can compare to previous commit

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy HTML
      run: |
        rsync -rltvz --delete \
          --omit-dir-times \
          --exclude='.git' \
          --exclude='.env' \
          -e "ssh -i ~/.ssh/id_rsa" \
          ./website_prod/nginx/html/ \
          ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${{ secrets.PROD_HTML_PATH }}/

    - name: Sync and rebuild changed Node services
      run: |
        SERVICES=()

        for svc in cfb_main_app cfb_matchup_app cbb_main_app race_schedule_app; do
          if git diff --name-only HEAD~1 HEAD | grep -q "website_prod/node/${svc}/"; then
            echo "${svc} changed — syncing"
            rsync -rltvz --delete \
              --exclude='.env' \
              --exclude='node_modules' \
              -e "ssh -i ~/.ssh/id_rsa" \
              ./website_prod/node/${svc}/ \
              ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${{ secrets.PROD_NODE_PATH }}/${svc}/
            SERVICES+=("${svc}")
          fi
        done

        if [ ${#SERVICES[@]} -gt 0 ]; then
          ssh -i ~/.ssh/id_rsa ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "cd ${{ secrets.PROD_COMPOSE_PATH }} && docker compose up -d --build ${SERVICES[*]}"
        fi

    - name: Sync nginx config and reload
      run: |
        if git diff --name-only HEAD~1 HEAD | grep -q "website_prod/nginx/.*\.conf"; then
          echo "nginx config changed — syncing and reloading"
          rsync -rltvz \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./website_prod/nginx/nginx_docker.conf \
            ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }}:${{ secrets.PROD_NGINX_CONF_PATH }}/conf.d/nginx_docker.conf
          ssh -i ~/.ssh/id_rsa ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "docker compose -f ${{ secrets.PROD_COMPOSE_PATH }}/compose.yaml exec nginx nginx -s reload"
        else
          echo "nginx config unchanged — skipping"
        fi
