<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Under Construction!</title>
    <link rel="stylesheet" href="cyberpunk.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        .maint-img {
            max-width: 250px;
            width: 100%;
            height: auto;
            margin: 0 auto 1.5rem auto;
            display: block;
            border-radius: 4px;
            border: 1px solid var(--amber);
            box-shadow: 0 0 20px var(--amber-glow);
        }

        .maint-title {
            font-family: var(--font-display);
            font-size: clamp(18px, 3.5vw, 30px);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 30px var(--amber), 0 0 60px var(--amber-glow);
            margin-bottom: 16px;
            letter-spacing: 0.05em;
        }

        .maint-text {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 2rem;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="neon-bar" style="position:fixed; top:0; left:0; right:0;"></div>

    <div class="container">
        <img class="maint-img"
             src="https://cheeymanwebsite.blob.core.windows.net/photos/underconstruction_2.png?sp=r&st=2025-09-30T16:25:45Z&se=2028-03-16T00:40:45Z&spr=https&sv=2024-11-04&sr=b&sig=J8FZV8QlMlLrEJFpF8eADrHc%2B5SshnqYEJtXT2Czdk8%3D"
             alt="Under Construction">
        <div class="maint-title">CHECK BACK SOON!</div>
        <p class="maint-text">New features coming! This page is currently getting an upgrade. Please check back soon!</p>
        <a href="cheesyhome.html" class="btn btn-green">Cheesyman Home</a>
    </div>

    <footer class="page-footer" style="position:fixed; bottom:0; left:0; right:0; margin:0;">
        &copy; <span id="year"></span> Cheesyman Inc. All rights reserved.
    </footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</body>
</html>
