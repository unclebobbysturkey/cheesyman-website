<!DOCTYPE html>
<html lang="en">
<head>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J8DVETW8G"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-0J8DVETW8G');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Cheese</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        /* Image Styling */
        .image-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img {
            width: 90%; /* Ensures it scales well */
            max-width: 500px; /* Limits the maximum size */
            height: auto;
            border-radius: 10px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
        }
        /* Button Styling */
        .button-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        #back-button {
            padding: 10px 20px;
            font-size: 18px;
            color: white;
            background-color: #ff9800;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.2);
        }
        #back-button:hover {
            background-color: #e68900;
        }
    </style>
</head>
<body>
    <h1>Today's Cheese</h1>

    <!-- Display Daily Image -->
    <div class="image-container">
        <img id="daily-image" src="" alt="Daily Cheese Image">
    </div>

    <!-- Centered Back Button -->
    <div class="button-container">
        <button id="back-button" onclick="goBack()">Back to Home</button>
    </div>

    <script>
        // Load the stored daily image URL
        const dailyImageUrl = localStorage.getItem("dailyImage");
        if (dailyImageUrl) {
            document.getElementById("daily-image").src = dailyImageUrl;
        } else {
            document.getElementById("daily-image").alt = "No image available.";
        }

        // Function to return to the home page
        function goBack() {
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
