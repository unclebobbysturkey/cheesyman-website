<body>
    <h1>Welcome to Cheesyman.com!</h1>
    <p>Home of the Cheesyman! The cutest, happiest little boy you'll ever meet. </p>
    
    <!-- Date & Time Display -->
    <p id="datetime">The Cheesy Time is: </p>

    <!-- Navigation Buttons -->
    <div class="button-container">
        <button class="button" id="random-button" onclick="goToRandomPhoto()">Cheesy Surprise</button>
        <a href="gallery.html" class="button" id="gallery-button">Cheesy Gallery</a>
        <a href="sports.html" class="button" id="sports-button">Cheesy Sports</a>
    </div>
    
    <!-- Daily Cheese Image -->
    <h2>The Daily Cheese</h2>
    <img id="daily-cheese-img" src="" alt="Daily Cheese">
    
    <script src="cheese-images.js"></script>
    <script>
        // Function to update the date & time every second
        function updateDateTime() {
            const now = new Date();
            const options = {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                timeZoneName: 'short'
            };
            document.getElementById("datetime").innerHTML = "<b>The Cheesy Time is: </b>" + now.toLocaleString('en-US', options);
        }
        
        // Update time immediately, then every second
        updateDateTime();
        setInterval(updateDateTime, 1000);
        
        // Get current day of the year (0 - 365)
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const oneDay = 1000 * 60 * 60 * 24;
        const dayOfYear = Math.floor(diff / oneDay);
        
        // Select an image based on the day of the year
        const imageIndex = dayOfYear % images.length;
        const dailyImageUrl = images[imageIndex];
        
        // Display the daily image on this page
        document.getElementById("daily-cheese-img").src = dailyImageUrl;
        
        // Function to navigate to random photo page
        function goToRandomPhoto() {
            const randomIndex = Math.floor(Math.random() * images.length);
            const randomImageUrl = images[randomIndex];
            localStorage.setItem("randomImage", randomImageUrl);
            window.location.href = "surprisecheese.html";
        }
    </script>

    <footer class="page-footer">
        &copy; <span id="currentYear"></span> Cheesyman Inc. All rights reserved.
    </footer>

    <script>
    // Auto-update copyright year
        document.getElementById("currentYear").textContent = new Date().getFullYear();
    </script>
</body>
