<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J8DVETW8G"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0J8DVETW8G');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Cheesyman.com!</title>
    <link rel="stylesheet" href="cyberpunk.css">
    <style>
        .cheesy-time {
            font-family: var(--font-mono);
            font-size: 15px;
            color: var(--green);
            text-shadow: 0 0 10px var(--green), 0 0 20px var(--green-glow);
            letter-spacing: 0.1em;
            margin: 24px 0 8px;
        }

        .nav-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            margin: 20px 0 40px;
        }

        .daily-section {
            max-width: 440px;
            margin: 0 auto;
        }

        .cheese-img {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 4px;
            border: 1px solid var(--orange);
            box-shadow: 0 0 20px var(--orange-glow), 0 0 60px rgba(255,102,0,0.08);
            display: block;
            margin: 16px auto 0;
        }
    </style>
</head>
<body>
    <div class="neon-bar"></div>

    <header class="page-header">
        <div class="header-kicker">cheesyman.com</div>
        <h1>WELCOME TO CHEESYMAN.COM!</h1>
        <p class="header-sub">Home of the Cheesyman! The cutest, happiest little boy you'll ever meet.</p>
    </header>

    <main class="page-wrap" style="text-align:center; padding-top:36px;">

        <p id="datetime" class="cheesy-time"></p>

        <div class="nav-grid">
            <button class="btn btn-orange" onclick="goToRandomPhoto()">Cheesy Surprise</button>
           <a href="underconstruction.html"  class="btn btn-blue">MBPhoto</a> 
            <a href="sports.html"   class="btn btn-orange">Cheesy Sports</a>
            <a href="/members"      class="btn btn-purple">Members</a>
        </div>

        <div class="section-label daily-section">daily cheese</div>
        <div class="daily-section">
            <img id="daily-cheese-img" src="" alt="Daily Cheese" class="cheese-img">
        </div>

    </main>

    <footer class="page-footer">
        &copy; <span id="currentYear"></span> Cheesyman Inc. All rights reserved.
    </footer>

    <script src="cheese-images.js"></script>
    <script>
        function updateDateTime() {
            const now = new Date();
            const options = {
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                hour12: false, timeZoneName: 'short'
            };
            document.getElementById("datetime").innerHTML =
                "<b>The Cheesy Time is: </b>" + now.toLocaleString('en-US', options);
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const oneDay = 1000 * 60 * 60 * 24;
        const dayOfYear = Math.floor(diff / oneDay);
        const imageIndex = dayOfYear % images.length;
        document.getElementById("daily-cheese-img").src = images[imageIndex];

        function goToRandomPhoto() {
            const randomIndex = Math.floor(Math.random() * images.length);
            localStorage.setItem("randomImage", images[randomIndex]);
            window.location.href = "surprisecheese.html";
        }

        document.getElementById("currentYear").textContent = new Date().getFullYear();
    </script>
</body>
</html>
