<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J8DVETW8G"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0J8DVETW8G');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheese Gallery - Cheesyman.com</title>
    <link rel="stylesheet" href="cyberpunk.css">
    <style>
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 8px 0;
            min-height: 400px;
        }

        .gallery-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            overflow: hidden;
            transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
            cursor: pointer;
        }

        .gallery-item:hover {
            border-color: var(--blue);
            box-shadow: 0 0 16px var(--blue-glow), inset 0 0 20px rgba(0,229,255,0.03);
            transform: translateY(-4px);
        }

        .gallery-item img {
            width: 100%;
            height: 240px;
            object-fit: contain;
            display: block;
            background-color: var(--surface2);
        }

        .gallery-item-number {
            padding: 8px 12px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            border-top: 1px solid var(--border);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin-top: 32px;
            flex-wrap: wrap;
        }

        .page-info {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            padding: 0 12px;
        }
    </style>
</head>
<body>
    <div class="neon-bar"></div>

    <header class="page-header">
        <div class="header-nav">
            <a href="cheesyhome.html" class="btn btn-amber">Back to Home</a>
        </div>
        <div class="header-kicker">cheesyman.com // gallery</div>
        <h1>THE CHEESIEST GALLERY</h1>
    </header>

    <main class="page-wrap" style="padding-top:36px;">

        <div class="gallery-container" id="gallery"></div>

        <div class="pagination">
            <button onclick="goToPage(1)"           id="firstBtn" class="btn btn-blue">First</button>
            <button onclick="previousPage()"        id="prevBtn"  class="btn btn-blue">Prev</button>
            <span class="page-info"                 id="pageInfo"></span>
            <button onclick="nextPage()"            id="nextBtn"  class="btn btn-blue">Next</button>
            <button onclick="goToPage(totalPages)"  id="lastBtn"  class="btn btn-blue">Last</button>
        </div>

    </main>

    <footer class="page-footer">
        &copy; <span id="currentYear"></span> Cheesyman Inc. All rights reserved.
    </footer>

    <script src="cheese-images.js"></script>
    <script>
        const ITEMS_PER_PAGE = 8;
        let currentPage = 1;
        let totalPages = Math.ceil(images.length / ITEMS_PER_PAGE);

        function displayPage(page) {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            const startIndex = (page - 1) * ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, images.length);

            for (let i = startIndex; i < endIndex; i++) {
                const galleryItem = document.createElement('div');
                galleryItem.className = 'gallery-item';

                const img = document.createElement('img');
                img.src = images[i];
                img.alt = `Cheese ${i + 1}`;
                img.onclick = () => window.open(images[i], '_blank');

                const itemNumber = document.createElement('div');
                itemNumber.className = 'gallery-item-number';
                itemNumber.textContent = `// Cheese #${i + 1}`;

                galleryItem.appendChild(img);
                galleryItem.appendChild(itemNumber);
                gallery.appendChild(galleryItem);
            }

            updatePaginationControls();
        }

        function updatePaginationControls() {
            document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prevBtn').disabled  = currentPage === 1;
            document.getElementById('firstBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled  = currentPage === totalPages;
            document.getElementById('lastBtn').disabled  = currentPage === totalPages;
        }

        function nextPage() {
            if (currentPage < totalPages) { currentPage++; displayPage(currentPage); window.scrollTo({top:0,behavior:'smooth'}); }
        }

        function previousPage() {
            if (currentPage > 1) { currentPage--; displayPage(currentPage); window.scrollTo({top:0,behavior:'smooth'}); }
        }

        function goToPage(page) {
            if (page >= 1 && page <= totalPages) { currentPage = page; displayPage(currentPage); window.scrollTo({top:0,behavior:'smooth'}); }
        }

        displayPage(1);
        document.getElementById("currentYear").textContent = new Date().getFullYear();
    </script>
</body>
</html>
