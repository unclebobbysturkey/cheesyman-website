<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J8DVETW8G"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0J8DVETW8G');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Schedule - Cheesyman.com</title>
    <link rel="stylesheet" href="cyberpunk.css">
    <style>
        /* Race surface colors expanded into more elements */
        :root {
            --accent:      #ff6600;
            --accent-glow: rgba(255, 102, 0, 0.35);
        }

        /* ── Checkered neon bar ──────────────────── */
        .checkered-bar {
            height: 8px;
            background-image: repeating-conic-gradient(#fff 0% 25%, var(--accent) 0% 50%);
            background-size: 16px 8px;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* ── Header ─────────────────────────────── */
        #page-header {
            text-align: center;
            padding: 36px 20px 28px;
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        #page-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 120%, var(--accent-glow) 0%, transparent 70%);
            pointer-events: none;
        }

        .back-btn {
            display: inline-block;
            margin: 0 5px 16px;
            padding: 8px 18px;
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--amber);
            border: 1px solid var(--amber);
            border-radius: 2px;
            text-decoration: none;
            text-shadow: 0 0 8px var(--amber);
            transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
        }
        .back-btn::before { content: '['; margin-right: 4px; opacity: 0.6; }
        .back-btn::after  { content: ']'; margin-left:  4px; opacity: 0.6; }
        .back-btn:hover {
            background: var(--amber-glow);
            box-shadow: 0 0 8px var(--amber), 0 0 24px var(--amber-glow);
            transform: translateY(-2px);
        }

        .series-label {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.35em;
            color: var(--accent);
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--accent);
            margin-bottom: 8px;
        }
        .series-label::before { content: '> '; }

        #page-header h1 {
            font-family: 'Orbitron', monospace;
            font-size: clamp(28px, 6vw, 66px);
            font-weight: 900;
            letter-spacing: 0.06em;
            color: #fff;
            line-height: 1;
            text-shadow:
                0 0 10px #fff,
                0 0 30px var(--accent),
                0 0 70px var(--accent),
                0 0 120px var(--accent-glow);
        }

        .subtitle {
            margin-top: 10px;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-dim);
            letter-spacing: 0.12em;
        }

        .header-logo {
            display: block;
            height: 68px;
            width: auto;
            margin: 0 auto 16px;
            filter: drop-shadow(0 0 12px rgba(0,0,0,0.7));
        }

        /* ── Layout ──────────────────────────────── */
        main {
            max-width: 1050px;
            margin: 0 auto;
            padding: 36px 20px 60px;
        }

        /* ── Next Up ─────────────────────────────── */
        .next-up-label {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            margin-bottom: 10px;
        }
        .next-up-label::before { content: '> '; }

        .next-up-card {
            background: linear-gradient(135deg, var(--surface), var(--surface2));
            border: 1px solid var(--accent);
            border-left: 4px solid var(--accent);
            border-radius: 2px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            box-shadow: 0 0 12px var(--accent-glow), 0 0 30px rgba(0,0,0,0.3), inset 0 0 30px rgba(0,0,0,0.1);
            margin-bottom: 32px;
            position: relative;
        }
        .next-up-card::before, .next-up-card::after {
            content: '';
            position: absolute;
            width: 12px; height: 12px;
            border-style: solid;
            border-color: var(--accent);
        }
        .next-up-card::before { top:-1px; left:-1px; border-width:2px 0 0 2px; }
        .next-up-card::after  { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }

        .next-up-date-block { text-align: center; min-width: 80px; }

        .next-up-month {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent);
        }

        .next-up-day {
            font-family: 'Orbitron', monospace;
            font-size: 52px;
            font-weight: 900;
            line-height: 1;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 30px var(--accent), 0 0 60px var(--accent-glow);
        }

        .next-up-dayname {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .next-up-divider {
            width: 1px; height: 60px;
            background: var(--border);
            flex-shrink: 0;
        }

        .next-up-info { flex: 1; min-width: 200px; }

        .next-up-event {
            font-family: 'Orbitron', monospace;
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.04em;
        }

        .next-up-track {
            font-family: var(--font-ui);
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-top: 4px;
        }

        .next-up-location {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
            letter-spacing: 0.04em;
        }

        .next-up-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: 2px;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .badge-dirt-pill  { background: rgba(224,154,58,0.12); color: var(--dirt);     border: 1px solid var(--dirt);     text-shadow: 0 0 6px var(--dirt-glow); }
        .badge-pave-pill  { background: rgba(77,166,255,0.12);  color: var(--pavement); border: 1px solid var(--pavement); text-shadow: 0 0 6px var(--pavement-glow); }

        /* ── Legend ──────────────────────────────── */
        .legend {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            text-transform: uppercase;
        }
        .legend-dot { width: 8px; height: 8px; border-radius: 1px; }
        .dot-dirt { background: var(--dirt); box-shadow: 0 0 4px var(--dirt-glow); }
        .dot-pave { background: var(--pavement); box-shadow: 0 0 4px var(--pavement-glow); }

        /* ── Table ───────────────────────────────── */
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-ui);
        }

        .schedule-table thead tr {
            border-bottom: 1px solid var(--accent);
        }
        .schedule-table thead th {
            padding: 10px 14px;
            text-align: left;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--accent);
            text-shadow: 0 0 8px var(--accent-glow);
        }

        .schedule-table tbody tr {
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            transition: background 0.12s;
        }
        .schedule-table tbody tr:nth-child(even) { background: var(--surface2); }
        .schedule-table tbody tr:hover { background: var(--surface3); }
        .schedule-table tbody tr.past { opacity: 0.3; }
        /* .next-row injected dynamically with series accent color */

        .schedule-table td {
            padding: 12px 14px;
            vertical-align: middle;
            font-size: 14px;
            color: var(--text);
        }

        .date-cell    { color: var(--accent); font-family: var(--font-mono); font-size: 12px; white-space: nowrap; text-shadow: 0 0 6px var(--accent-glow); }
        .track-cell   { color: #fff; font-weight: 700; font-size: 15px; }
        .location-cell { color: var(--text-dim); font-size: 13px; }
        .event-cell   { font-size: 13px; color: var(--text); }
        .size-cell    { text-align: right; color: var(--text-dim); font-size: 12px; font-family: var(--font-mono); white-space: nowrap; }
        .surface-cell { text-align: center; }

        .surface-badge {
            display: inline-block;
            width: 26px; height: 26px;
            border-radius: 2px;
            font-family: var(--font-mono);
            font-size: 11px; font-weight: 400;
            text-align: center; line-height: 26px;
            letter-spacing: 0;
        }
        .badge-dirt { background: rgba(224,154,58,0.15); color: var(--dirt);     border: 1px solid var(--dirt);     box-shadow: 0 0 4px var(--dirt-glow); }
        .badge-pave { background: rgba(77,166,255,0.15);  color: var(--pavement); border: 1px solid var(--pavement); box-shadow: 0 0 4px var(--pavement-glow); }

        /* ── Loading / Error ─────────────────────── */
        .loading   { text-align: center; padding: 60px 20px; font-family: var(--font-mono); font-size: 16px; letter-spacing: 0.1em; color: var(--text-dim); }
        .loading::before { content: '> '; color: var(--green); text-shadow: 0 0 8px var(--green); }
        .error-msg { text-align: center; padding: 60px 20px; font-family: var(--font-mono); font-size: 16px; letter-spacing: 0.08em; color: #ff4444; }
        .error-msg a { color: #ff6666; }

        /* ── Mobile ──────────────────────────────── */
        @media (max-width: 650px) {
            .next-up-card { flex-direction: column; gap: 12px; }
            .next-up-divider { width: 100%; height: 1px; }
            .schedule-table thead { display: none; }
            .schedule-table,
            .schedule-table tbody,
            .schedule-table tr,
            .schedule-table td { display: block; width: 100%; }
            .schedule-table tbody tr {
                margin-bottom: 10px;
                border-radius: 2px;
                border: 1px solid var(--border);
                padding: 10px;
                position: relative;
            }
            .schedule-table td { padding: 3px 8px; border: none; }
            .surface-cell { position: absolute; top: 10px; right: 10px; }
            .size-cell { text-align: left; }
        }
    </style>
</head>
<body>
    <div class="checkered-bar"></div>

    <header id="page-header">
        <div>
            <a href="racing.html"      class="back-btn">Back to Racing</a>
            <a href="cheesyhome.html"  class="back-btn">Back to Cheese</a>
        </div>
        <img id="header-logo" class="header-logo" alt="" src="" style="display:none">
        <div class="series-label" id="header-season">2026 Season Schedule</div>
        <h1 id="header-title">Race Schedule</h1>
        <div class="subtitle" id="header-subtitle">Cheesyman.com</div>
    </header>

    <main>
        <div id="content">
            <div class="loading">Loading schedule...</div>
        </div>
    </main>

    <footer class="page-footer">
        &copy; <span id="currentYear"></span> Cheesyman Inc. All rights reserved.
    </footer>

    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // ── Series metadata ──────────────────────────────────────────────────
        const SERIES_META = {
            'usac-silver-crown': { name: 'USAC Silver Crown',           title: 'Silver Crown',                subtitle: 'USAC Silver Crown Series' },
            'usac-sprint':       { name: 'USAC Sprint Car',             title: 'Sprint Car',                  subtitle: 'USAC National Sprint Car Series' },
            'usac-midget':       { name: 'USAC Midget',                 title: 'Midget',                      subtitle: 'USAC National Midget Series' },
            'high-limit':        { name: 'High Limit Racing',           title: 'High Limit Racing',            subtitle: 'High Limit Sprint Car Series' },
            'woo-sprint':        { name: 'World of Outlaws',            title: 'NOS Energy Sprint Cars',       subtitle: 'World of Outlaws Sprint Car Series' },
            'indycar':           { name: 'IndyCar Series',              title: 'IndyCar',                     subtitle: 'NTT IndyCar Series' },
            'nascar-cup':        { name: 'NASCAR Cup Series',           title: 'NASCAR Cup',                  subtitle: 'NASCAR Cup Series' },
            'imsa':              { name: 'IMSA SportsCar Championship', title: 'IMSA',                        subtitle: 'IMSA WeatherTech SportsCar Championship' },
            'f1':                { name: 'Formula 1',                   title: 'Formula 1',                   subtitle: 'FIA Formula One World Championship' },
        };

        const MONTHS  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const WEEKDAY = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

        const slug = new URLSearchParams(window.location.search).get('series');

        if (!slug || !SERIES_META[slug]) {
            document.getElementById('content').innerHTML =
                '<div class="error-msg">Unknown series. Go back to the <a href="racing.html">Racing page</a> and select a series.</div>';
        } else {
            const meta = SERIES_META[slug];
            document.title = `${meta.name} 2026 - Cheesyman.com`;
            document.getElementById('header-title').textContent    = meta.title;
            document.getElementById('header-subtitle').textContent = `Cheesyman.com \u2014 ${meta.subtitle}`;

            fetch(`/raceschedule/${slug}`)
                .then(r => {
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    return r.json();
                })
                .then(data => {
                    const seriesData = data.series || {};
                    const root       = document.documentElement;

                    const accent     = seriesData.color_accent || '#ff6600';
                    const accentGlow = hexToRgba(accent, 0.35);
                    const headerBg   = `linear-gradient(135deg, #080810 0%, #0e0e1a 60%, ${hexToRgba(accent, 0.10)} 100%)`;

                    root.style.setProperty('--accent',      accent);
                    root.style.setProperty('--accent-glow', accentGlow);
                    document.getElementById('page-header').style.background = headerBg;

                    // Inject next-row highlight style
                    const style = document.createElement('style');
                    style.textContent = `
                        .next-row {
                            background: ${hexToRgba(accent, 0.08)} !important;
                            outline: 1px solid ${accent};
                            outline-offset: -1px;
                        }
                    `;
                    document.head.appendChild(style);

                    // Show logo
                    const logoImg = document.getElementById('header-logo');
                    if (seriesData.logo_url) {
                        logoImg.src = seriesData.logo_url;
                        logoImg.alt = seriesData.name || meta.name;
                        logoImg.style.display = 'block';
                    }

                    renderSchedule(data.events, meta);
                })
                .catch(err => {
                    document.getElementById('content').innerHTML =
                        '<div class="error-msg">Failed to load schedule — please try again later.</div>';
                    console.error('Schedule fetch error:', err);
                });
        }

        // ── Helpers ──────────────────────────────────────────────────────────

        function parseDate(isoStr) {
            const [y, m, d] = isoStr.split('T')[0].split('-').map(Number);
            return new Date(y, m - 1, d);
        }

        function formatDateRange(startIso, endIso) {
            const s = parseDate(startIso);
            const month = MONTHS[s.getMonth()];
            if (!endIso || endIso.split('T')[0] === startIso.split('T')[0]) {
                return `${month} ${s.getDate()}`;
            }
            const e = parseDate(endIso);
            if (s.getMonth() === e.getMonth()) {
                return `${month} ${s.getDate()}\u2013${e.getDate()}`;
            }
            return `${month} ${s.getDate()}\u2013${MONTHS[e.getMonth()]} ${e.getDate()}`;
        }

        function formatLocation(ev) {
            if (!ev.city && !ev.state && !ev.country) return 'TBA';
            const parts = [ev.city, ev.state].filter(Boolean);
            if (ev.country && ev.country !== 'United States') parts.push(ev.country);
            return parts.join(', ') || 'TBA';
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        // ── Render ───────────────────────────────────────────────────────────
        function renderSchedule(events, meta) {
            if (!events.length) {
                document.getElementById('content').innerHTML =
                    '<div class="error-msg">No events found for this series.</div>';
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let nextIdx = -1;
            for (let i = 0; i < events.length; i++) {
                const endDate = events[i].event_date_end
                    ? parseDate(events[i].event_date_end)
                    : parseDate(events[i].event_date);
                if (endDate >= today) { nextIdx = i; break; }
            }

            let html = '';

            // ── Next Up Card ─────────────────────────────────────────────────
            if (nextIdx >= 0) {
                const ev    = events[nextIdx];
                const start = parseDate(ev.event_date);
                const endIso = ev.event_date_end ? ev.event_date_end.split('T')[0] : null;

                let dayDisplay = String(start.getDate());
                if (endIso && endIso !== ev.event_date.split('T')[0]) {
                    const end = parseDate(endIso);
                    dayDisplay = start.getMonth() === end.getMonth()
                        ? `${start.getDate()}\u2013${end.getDate()}`
                        : `${start.getDate()}`;
                }

                const surfClass = ev.surface === 'dirt' ? 'badge-dirt-pill' : 'badge-pave-pill';
                const surfLabel = ev.surface === 'dirt' ? 'Dirt' : 'Pavement';
                const eventName = ev.event_name && ev.event_name !== 'TBA' ? ev.event_name : '';

                html += `
                <div class="next-up-label">&#127937; Next Up</div>
                <div class="next-up-card">
                    <div class="next-up-date-block">
                        <div class="next-up-month">${MONTHS[start.getMonth()]}</div>
                        <div class="next-up-day">${dayDisplay}</div>
                        <div class="next-up-dayname">${WEEKDAY[start.getDay()]}</div>
                    </div>
                    <div class="next-up-divider"></div>
                    <div class="next-up-info">
                        ${eventName ? `<div class="next-up-event">${eventName}</div>` : ''}
                        <div class="next-up-track">${ev.track_name || 'TBA'}</div>
                        <div class="next-up-location">${formatLocation(ev)}${ev.size ? ' &bull; ' + ev.size : ''}</div>
                        <div class="next-up-badge ${surfClass}">${surfLabel}</div>
                    </div>
                </div>`;
            }

            // ── Surface Legend ───────────────────────────────────────────────
            const surfaces = [...new Set(events.map(e => e.surface).filter(Boolean))];
            if (surfaces.length > 1) {
                html += `
                <div class="legend">
                    <div class="legend-item"><div class="legend-dot dot-dirt"></div>Dirt</div>
                    <div class="legend-item"><div class="legend-dot dot-pave"></div>Pavement</div>
                </div>`;
            } else if (surfaces.length === 1) {
                const label = surfaces[0] === 'dirt' ? 'All Dirt' : 'All Pavement';
                const cls   = surfaces[0] === 'dirt' ? 'dot-dirt' : 'dot-pave';
                html += `<div class="legend"><div class="legend-item"><div class="legend-dot ${cls}"></div>${label}</div></div>`;
            }

            // ── Schedule Table ───────────────────────────────────────────────
            html += `
            <table class="schedule-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>Date</th>
                        <th>Track</th>
                        <th>Location</th>
                        <th>Event</th>
                        <th>Size</th>
                    </tr>
                </thead>
                <tbody>`;

            events.forEach((ev, i) => {
                const startIso = ev.event_date.split('T')[0];
                const endIso   = ev.event_date_end ? ev.event_date_end.split('T')[0] : null;
                const endDate  = endIso ? parseDate(endIso) : parseDate(startIso);
                const isPast   = endDate < today;
                const isNext   = i === nextIdx;
                const rowClass = isPast ? 'past' : isNext ? 'next-row' : '';
                const badgeCls = ev.surface === 'dirt' ? 'badge-dirt' : 'badge-pave';
                const badgeLbl = ev.surface === 'dirt' ? 'D' : 'P';

                html += `
                    <tr class="${rowClass}">
                        <td class="surface-cell"><span class="surface-badge ${badgeCls}">${badgeLbl}</span></td>
                        <td class="date-cell">${formatDateRange(startIso, endIso)}</td>
                        <td class="track-cell">${ev.track_name || 'TBA'}</td>
                        <td class="location-cell">${formatLocation(ev)}</td>
                        <td class="event-cell">${ev.event_name || ''}</td>
                        <td class="size-cell">${ev.size || ''}</td>
                    </tr>`;
            });

            html += `</tbody></table>`;
            document.getElementById('content').innerHTML = html;
        }
    </script>
</body>
</html>
