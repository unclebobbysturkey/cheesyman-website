<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J8DVETW8G"></script>
    <script>
    window.dataLayer = window.dataLayer || [];

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Schedule - Cheesyman.com</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #222;
            --accent: #ff5722;
            --accent-glow: rgba(255, 87, 34, 0.15);
            --text: #f0f0f0;
            --muted: #888;
            --border: #2e2e2e;
            --dirt: #c0853a;
            --pavement: #5b8dd9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Barlow', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .checkered-bar {
            height: 10px;
            background-image: repeating-conic-gradient(#fff 0% 25%, var(--accent) 0% 50%);
            background-size: 20px 10px;
        }

        header {
            padding: 40px 20px 30px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% 120%, var(--accent-glow) 0%, transparent 70%);
            pointer-events: none;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 20px;
            background-color: #4caf50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.05em;
            transition: background 0.2s;
        }
        .back-btn:hover { background-color: #3e8e41; }

        .series-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.3em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(38px, 7vw, 72px);
            letter-spacing: 0.05em;
            color: #fff;
            line-height: 1;
            text-shadow: 0 0 40px var(--accent-glow);
        }

        .subtitle {
            margin-top: 10px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 17px;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        .header-logo {
            display: block;
            height: 72px;
            width: auto;
            margin: 0 auto 18px;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.6));
        }

        main {
            max-width: 1050px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        /* ── Next Up Card ── */
        .next-up-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .next-up-card {
            background: linear-gradient(135deg, #1e1e1e, #252525);
            border: 1px solid var(--accent);
            border-left: 5px solid var(--accent);
            border-radius: 8px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
            margin-bottom: 36px;
        }

        .next-up-date-block {
            text-align: center;
            min-width: 80px;
        }

        .next-up-month {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .next-up-day {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 52px;
            line-height: 1;
            color: #fff;
        }

        .next-up-dayname {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .next-up-divider {
            width: 1px;
            height: 60px;
            background: var(--border);
            flex-shrink: 0;
        }

        .next-up-info { flex: 1; min-width: 200px; }

        .next-up-event {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.05em;
        }

        .next-up-track {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 17px;
            font-weight: 600;
            color: var(--text);
            margin-top: 4px;
        }

        .next-up-location {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        .next-up-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: 12px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        .badge-dirt-pill  { background: rgba(192,133,58,0.2); color: var(--dirt); border: 1px solid var(--dirt); }
        .badge-pave-pill  { background: rgba(91,141,217,0.2); color: var(--pavement); border: 1px solid var(--pavement); }

        /* ── Legend ── */
        .legend {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
        }

        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-dirt { background: var(--dirt); }
        .dot-pave { background: var(--pavement); }

        /* ── Table ── */
        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Barlow Condensed', sans-serif;
        }

        .schedule-table thead tr { background: var(--accent); }

        .schedule-table thead th {
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #fff;
        }

        .schedule-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
            background: var(--surface);
        }

        .schedule-table tbody tr:nth-child(even) { background: var(--surface2); }
        .schedule-table tbody tr:hover { background: #2a2a2a; }
        .schedule-table tbody tr.past { opacity: 0.35; }

        /* .next-row is injected dynamically with series color */

        .schedule-table td {
            padding: 13px 16px;
            vertical-align: middle;
            font-size: 15px;
        }

        .date-cell      { font-weight: 700; color: var(--accent); white-space: nowrap; font-size: 14px; }
        .track-cell     { font-weight: 700; font-size: 15px; color: #fff; }
        .location-cell  { color: var(--muted); font-size: 13px; }
        .event-cell     { font-weight: 600; font-size: 14px; color: var(--text); }
        .size-cell      { text-align: right; color: var(--muted); font-size: 13px; white-space: nowrap; }
        .surface-cell   { text-align: center; }

        .surface-badge {
            display: inline-block;
            width: 26px; height: 26px;
            border-radius: 50%;
            font-size: 11px; font-weight: 700;
            text-align: center; line-height: 26px;
        }
        .badge-dirt { background: var(--dirt); color: #fff; }
        .badge-pave { background: var(--pavement); color: #fff; }

        /* ── Loading / Error ── */
        .loading, .error-msg {
            text-align: center;
            padding: 60px 20px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 20px;
            letter-spacing: 0.1em;
        }
        .loading   { color: var(--muted); }
        .error-msg { color: #e53935; }
        .error-msg a { color: inherit; }

        /* ── Mobile ── */
        @media (max-width: 650px) {
            .next-up-card { flex-direction: column; gap: 12px; }
            .next-up-divider { width: 100%; height: 1px; }
            .schedule-table thead { display: none; }
            .schedule-table,
            .schedule-table tbody,
            .schedule-table tr,
            .schedule-table td { display: block; width: 100%; }
            .schedule-table tbody tr {
                margin-bottom: 10px;
                border-radius: 6px;
                border: 1px solid var(--border);
                padding: 10px;
                position: relative;
            }
            .schedule-table td { padding: 3px 8px; border: none; }
            .surface-cell { position: absolute; top: 10px; right: 10px; }
            .size-cell { text-align: left; }
        }

        .page-footer {
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            margin-top: 3rem;
            padding: 1rem;
            background-color: rgba(255, 255, 255, 0.03);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="checkered-bar"></div>

    <header id="page-header">
        <div><a href="racing.html" class="back-btn">⬅ Back to Racing</a></div>
        <div><a href="cheesyhome.html" class="back-btn">⬅ Back to Cheese</a></div>
        <img id="header-logo" class="header-logo" alt="" src="" style="display:none">
        <div class="series-label" id="header-season">2026 Season Schedule</div>
        <h1 id="header-title">Race Schedule</h1>
        <div class="subtitle" id="header-subtitle">Cheesyman.com</div>
    </header>

    <main>
        <div id="content">
            <div class="loading">Loading schedule...</div>
        </div>
    </main>

    <footer class="page-footer">
        &copy; <span id="currentYear"></span> Cheesyman Inc. All rights reserved.
    </footer>

    <script>
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // ── Series metadata ──────────────────────────────────────────────────
        // Keeps only display strings not available from the DB.
        // Colors (accent, accentGlow, headerBg) are computed from color_accent after fetch.
        const SERIES_META = {
            'usac-silver-crown': { name: 'USAC Silver Crown',          title: 'Silver Crown',              subtitle: 'USAC Silver Crown Series' },
            'usac-sprint':       { name: 'USAC Sprint Car',            title: 'Sprint Car',                subtitle: 'USAC National Sprint Car Series' },
            'usac-midget':       { name: 'USAC Midget',               title: 'Midget',                    subtitle: 'USAC National Midget Series' },
            'high-limit':        { name: 'High Limit Racing',          title: 'High Limit Racing',         subtitle: 'High Limit Sprint Car Series' },
            'woo-sprint':        { name: 'World of Outlaws',           title: 'NOS Energy Drink Sprint Cars', subtitle: 'World of Outlaws Sprint Car Series' },
            'indycar':           { name: 'IndyCar Series',             title: 'IndyCar',                   subtitle: 'NTT IndyCar Series' },
            'nascar-cup':        { name: 'NASCAR Cup Series',          title: 'NASCAR Cup',                subtitle: 'NASCAR Cup Series' },
            'imsa':              { name: 'IMSA SportsCar Championship',title: 'IMSA',                      subtitle: 'IMSA WeatherTech SportsCar Championship' },
            'f1':                { name: 'Formula 1',                  title: 'Formula 1',                 subtitle: 'FIA Formula One World Championship' },
        };

        const MONTHS  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const WEEKDAY = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

        // ── Read ?series= param ──────────────────────────────────────────────
        const slug = new URLSearchParams(window.location.search).get('series');

        if (!slug || !SERIES_META[slug]) {
            document.getElementById('content').innerHTML =
                '<div class="error-msg">Unknown series. Go back to the <a href="racing.html">Racing page</a> and select a series.</div>';
        } else {
            const meta = SERIES_META[slug];

            // Apply display strings pre-fetch — colors/logo come from DB after fetch
            document.title = `${meta.name} 2026 - Cheesyman.com`;
            document.getElementById('header-title').textContent   = meta.title;
            document.getElementById('header-subtitle').textContent = `Cheesyman.com \u2014 ${meta.subtitle}`;

            // Fetch schedule from API
            fetch(`/raceschedule/${slug}`)
                .then(r => {
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    return r.json();
                })
                .then(data => {
                    const seriesData = data.series || {};
                    const root       = document.documentElement;

                    // Compute accent values from DB color_accent
                    const accent     = seriesData.color_accent || '#ff5722';
                    const accentGlow = hexToRgba(accent, 0.15);
                    const headerBg   = `linear-gradient(135deg, #111 0%, #1c1c1c 60%, ${hexToRgba(accent, 0.12)} 100%)`;

                    root.style.setProperty('--accent',      accent);
                    root.style.setProperty('--accent-glow', accentGlow);
                    document.getElementById('page-header').style.background = headerBg;

                    // Inject row-highlight style for the next upcoming event
                    const style = document.createElement('style');
                    style.textContent = `.next-row { background: ${hexToRgba(accent, 0.09)} !important; outline: 1px solid ${accent}; outline-offset: -1px; }`;
                    document.head.appendChild(style);

                    // Show logo
                    const logoImg = document.getElementById('header-logo');
                    if (seriesData.logo_url) {
                        logoImg.src = seriesData.logo_url;
                        logoImg.alt = seriesData.name || meta.name;
                        logoImg.style.display = 'block';
                    }

                    renderSchedule(data.events, meta);
                })
                .catch(err => {
                    document.getElementById('content').innerHTML =
                        '<div class="error-msg">Failed to load schedule — please try again later.</div>';
                    console.error('Schedule fetch error:', err);
                });
        }

        // ── Helpers ──────────────────────────────────────────────────────────

        // Parse ISO date string without timezone shift
        function parseDate(isoStr) {
            const [y, m, d] = isoStr.split('T')[0].split('-').map(Number);
            return new Date(y, m - 1, d);
        }

        // Format a date range for display (e.g. "Apr 3", "Apr 3–5", "Apr 30–May 1")
        function formatDateRange(startIso, endIso) {
            const s = parseDate(startIso);
            const month = MONTHS[s.getMonth()];
            if (!endIso || endIso.split('T')[0] === startIso.split('T')[0]) {
                return `${month} ${s.getDate()}`;
            }
            const e = parseDate(endIso);
            if (s.getMonth() === e.getMonth()) {
                return `${month} ${s.getDate()}\u2013${e.getDate()}`;
            }
            return `${month} ${s.getDate()}\u2013${MONTHS[e.getMonth()]} ${e.getDate()}`;
        }

        // Build location string handling international tracks and NULL fields
        function formatLocation(ev) {
            if (!ev.city && !ev.state && !ev.country) return 'TBA';
            const parts = [ev.city, ev.state].filter(Boolean);
            if (ev.country && ev.country !== 'United States') parts.push(ev.country);
            return parts.join(', ') || 'TBA';
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        // ── Render ───────────────────────────────────────────────────────────
        function renderSchedule(events, meta) {
            if (!events.length) {
                document.getElementById('content').innerHTML =
                    '<div class="error-msg">No events found for this series.</div>';
                return;
            }

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Find the first event that hasn't ended yet
            let nextIdx = -1;
            for (let i = 0; i < events.length; i++) {
                const endDate = events[i].event_date_end
                    ? parseDate(events[i].event_date_end)
                    : parseDate(events[i].event_date);
                if (endDate >= today) {
                    nextIdx = i;
                    break;
                }
            }

            let html = '';

            // ── Next Up Card ─────────────────────────────────────────────────
            if (nextIdx >= 0) {
                const ev   = events[nextIdx];
                const start = parseDate(ev.event_date);
                const endIso = ev.event_date_end ? ev.event_date_end.split('T')[0] : null;

                // Day display: single day or range
                let dayDisplay = String(start.getDate());
                if (endIso && endIso !== ev.event_date.split('T')[0]) {
                    const end = parseDate(endIso);
                    dayDisplay = start.getMonth() === end.getMonth()
                        ? `${start.getDate()}\u2013${end.getDate()}`
                        : `${start.getDate()}`;
                }

                const surfClass = ev.surface === 'dirt' ? 'badge-dirt-pill' : 'badge-pave-pill';
                const surfLabel = ev.surface === 'dirt' ? 'Dirt' : 'Pavement';
                const eventName = ev.event_name && ev.event_name !== 'TBA' ? ev.event_name : '';

                html += `
                <div class="next-up-label">&#127937; Next Up</div>
                <div class="next-up-card">
                    <div class="next-up-date-block">
                        <div class="next-up-month">${MONTHS[start.getMonth()]}</div>
                        <div class="next-up-day">${dayDisplay}</div>
                        <div class="next-up-dayname">${WEEKDAY[start.getDay()]}</div>
                    </div>
                    <div class="next-up-divider"></div>
                    <div class="next-up-info">
                        ${eventName ? `<div class="next-up-event">${eventName}</div>` : ''}
                        <div class="next-up-track">${ev.track_name || 'TBA'}</div>
                        <div class="next-up-location">${formatLocation(ev)}${ev.size ? ' &bull; ' + ev.size : ''}</div>
                        <div class="next-up-badge ${surfClass}">${surfLabel}</div>
                    </div>
                </div>`;
            }

            // ── Surface Legend ───────────────────────────────────────────────
            const surfaces = [...new Set(events.map(e => e.surface).filter(Boolean))];
            if (surfaces.length > 1) {
                html += `
                <div class="legend">
                    <div class="legend-item"><div class="legend-dot dot-dirt"></div>Dirt</div>
                    <div class="legend-item"><div class="legend-dot dot-pave"></div>Pavement</div>
                </div>`;
            } else if (surfaces.length === 1) {
                const label = surfaces[0] === 'dirt' ? 'All Dirt' : 'All Pavement';
                const cls   = surfaces[0] === 'dirt' ? 'dot-dirt' : 'dot-pave';
                html += `<div class="legend"><div class="legend-item"><div class="legend-dot ${cls}"></div>${label}</div></div>`;
            }

            // ── Schedule Table ───────────────────────────────────────────────
            html += `
            <table class="schedule-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>Date</th>
                        <th>Track</th>
                        <th>Location</th>
                        <th>Event</th>
                        <th>Size</th>
                    </tr>
                </thead>
                <tbody>`;

            events.forEach((ev, i) => {
                const startIso  = ev.event_date.split('T')[0];
                const endIso    = ev.event_date_end ? ev.event_date_end.split('T')[0] : null;
                const endDate   = endIso ? parseDate(endIso) : parseDate(startIso);
                const isPast    = endDate < today;
                const isNext    = i === nextIdx;
                const rowClass  = isPast ? 'past' : isNext ? 'next-row' : '';
                const badgeCls  = ev.surface === 'dirt' ? 'badge-dirt' : 'badge-pave';
                const badgeLbl  = ev.surface === 'dirt' ? 'D' : 'P';

                html += `
                    <tr class="${rowClass}">
                        <td class="surface-cell"><span class="surface-badge ${badgeCls}">${badgeLbl}</span></td>
                        <td class="date-cell">${formatDateRange(startIso, endIso)}</td>
                        <td class="track-cell">${ev.track_name || 'TBA'}</td>
                        <td class="location-cell">${formatLocation(ev)}</td>
                        <td class="event-cell">${ev.event_name || ''}</td>
                        <td class="size-cell">${ev.size || ''}</td>
                    </tr>`;
            });

            html += `</tbody></table>`;
            document.getElementById('content').innerHTML = html;
        }
    </script>
</body>
</html>
