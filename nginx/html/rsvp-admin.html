<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP Admin</title>
  <link rel="stylesheet" href="cyberpunk.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Login ────────────────────────────────────── */
    #login-screen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .login-panel {
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-panel .login-title {
      font-family: var(--font-display);
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.08em;
      text-shadow: 0 0 10px #fff, 0 0 30px var(--orange), 0 0 60px var(--orange-glow);
      margin-bottom: 6px;
    }

    .login-panel p {
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.1em;
      margin-bottom: 24px;
    }
    .login-panel p::before { content: '// '; color: var(--orange); }

    .login-panel input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 2px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 14px;
    }
    .login-panel input[type="password"]::placeholder { color: var(--text-faint); }
    .login-panel input[type="password"]:focus {
      border-color: var(--orange);
      box-shadow: 0 0 8px var(--orange-glow);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--orange);
      border: 1px solid var(--orange);
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0 0 8px var(--orange);
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }
    .login-btn::before { content: '[ '; opacity: 0.6; }
    .login-btn::after  { content: ' ]'; opacity: 0.6; }
    .login-btn:hover {
      background: var(--orange-glow);
      box-shadow: 0 0 8px var(--orange), 0 0 24px var(--orange-glow);
      transform: translateY(-2px);
    }

    .login-error {
      color: #ff4444;
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      margin-top: 12px;
      display: none;
    }
    .login-error::before { content: '! '; }

    /* ── Dashboard ────────────────────────────────── */
    #dashboard { display: none; padding: 32px 24px; max-width: 960px; margin: 0 auto; width: 100%; }

    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .dash-title {
      font-family: var(--font-display);
      font-size: clamp(16px, 3vw, 24px);
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.08em;
      text-shadow: 0 0 10px var(--orange-glow);
    }

    .logout-btn {
      padding: 8px 18px;
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .logout-btn:hover { border-color: var(--orange); color: var(--orange); }

    /* ── Stat grid ────────────────────────────────── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 20px 16px;
      text-align: center;
      position: relative;
    }
    .stat-card::before, .stat-card::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      border-style: solid;
    }
    .stat-card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .stat-card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .stat-card .stat-num {
      font-family: var(--font-display);
      font-size: 2.4rem;
      font-weight: 900;
      line-height: 1;
    }
    .stat-card .stat-lbl {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      margin-top: 6px;
      text-transform: uppercase;
    }

    .stat-total   { border-color: var(--blue);   }
    .stat-total::before, .stat-total::after   { border-color: var(--blue);   }
    .stat-total   .stat-num { color: var(--blue);   text-shadow: 0 0 12px var(--blue-glow);   }

    .stat-attending { border-color: var(--green); }
    .stat-attending::before, .stat-attending::after { border-color: var(--green); }
    .stat-attending .stat-num { color: var(--green); text-shadow: 0 0 12px var(--green-glow); }

    .stat-declined  { border-color: var(--purple); }
    .stat-declined::before,  .stat-declined::after  { border-color: var(--purple); }
    .stat-declined  .stat-num { color: var(--purple); text-shadow: 0 0 12px var(--purple-glow); }

    .stat-guests    { border-color: var(--orange); }
    .stat-guests::before,    .stat-guests::after    { border-color: var(--orange); }
    .stat-guests    .stat-num { color: var(--orange); text-shadow: 0 0 12px var(--orange-glow); }

    /* ── Table panel ──────────────────────────────── */
    .table-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .table-panel::before, .table-panel::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-style: solid;
      border-color: var(--orange);
      z-index: 1;
    }
    .table-panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .table-panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .table-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .table-header-title {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .table-header-title::before { content: '// '; color: var(--orange); }

    .filter-btns { display: flex; gap: 6px; }

    .filter-btn {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--text-dim);
      transition: all 0.1s;
    }
    .filter-btn:hover { border-color: var(--orange); color: var(--orange); }
    .filter-btn.active {
      background: var(--orange-glow);
      border-color: var(--orange);
      color: var(--orange);
      text-shadow: 0 0 6px var(--orange);
    }

    table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 13px; }
    th {
      padding: 10px 16px;
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 2px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: var(--font-mono);
    }
    .badge-yes {
      background: rgba(0, 255, 65, 0.08);
      border: 1px solid var(--green);
      color: var(--green);
      text-shadow: 0 0 6px var(--green-glow);
    }
    .badge-no {
      background: rgba(120, 120, 168, 0.08);
      border: 1px solid var(--text-dim);
      color: var(--text-dim);
    }

    .empty-state {
      padding: 40px;
      text-align: center;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.1em;
    }
    .empty-state::before { content: '// '; color: var(--text-faint); }

    @media (max-width: 600px) {
      #dashboard { padding: 20px 12px; }
      td, th { padding: 10px 10px; }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>
  <div class="neon-bar"></div>

  <!-- Login -->
  <div id="login-screen">
    <div class="panel panel-orange login-panel">
      <div class="header-kicker" style="text-align:center; margin-bottom:10px;">Restricted Access</div>
      <div class="login-title">RSVP Admin</div>
      <p>enter your password to view guest list</p>
      <input type="password" id="password" placeholder="password" onkeydown="if(event.key==='Enter') login()" />
      <button class="login-btn" onclick="login()">Sign In</button>
      <p class="login-error" id="login-error">Incorrect password.</p>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="dash-header">
      <div>
        <div style="font-family:var(--font-mono);font-size:11px;letter-spacing:0.3em;color:var(--orange);text-transform:uppercase;text-shadow:0 0 8px var(--orange);margin-bottom:4px;">&gt; ADMIN PANEL</div>
        <div class="dash-title">Guest List</div>
      </div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>

    <div class="stat-grid">
      <div class="stat-card stat-total">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-lbl">Total RSVPs</div>
      </div>
      <div class="stat-card stat-attending">
        <div class="stat-num" id="stat-attending">—</div>
        <div class="stat-lbl">Attending</div>
      </div>
      <div class="stat-card stat-declined">
        <div class="stat-num" id="stat-declined">—</div>
        <div class="stat-lbl">Declined</div>
      </div>
      <div class="stat-card stat-guests">
        <div class="stat-num" id="stat-guests">—</div>
        <div class="stat-lbl">Total Guests</div>
      </div>
    </div>

    <div class="table-panel">
      <div class="table-header">
        <div class="table-header-title">RSVPs</div>
        <div class="filter-btns">
          <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
          <button class="filter-btn" onclick="setFilter('yes', this)">Attending</button>
          <button class="filter-btn" onclick="setFilter('no', this)">Declined</button>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th class="hide-mobile">Email</th>
              <th class="hide-mobile">Phone</th>
              <th>Adults</th>
              <th class="hide-mobile">Children</th>
              <th>Status</th>
              <th class="hide-mobile">Date</th>
            </tr>
          </thead>
          <tbody id="rsvp-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let allRsvps = [];
    let currentFilter = 'all';
    let adminPassword = '';

    async function login() {
      const pw = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';

      try {
        const res = await fetch(`/rsvp_api/admin?password=${encodeURIComponent(pw)}`);
        const data = await res.json();

        if (!res.ok) {
          errEl.style.display = 'block';
          return;
        }

        adminPassword = pw;
        allRsvps = data.rsvps;
        document.getElementById('stat-total').textContent     = data.total_rsvps;
        document.getElementById('stat-attending').textContent = data.total_attending;
        document.getElementById('stat-declined').textContent  = data.total_declined;
        document.getElementById('stat-guests').textContent    = data.total_guests;

        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        renderTable();
      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
      }
    }

    function logout() {
      adminPassword = '';
      allRsvps = [];
      document.getElementById('password').value = '';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTable();
    }

    function renderTable() {
      const filtered = allRsvps.filter(r => {
        if (currentFilter === 'yes') return r.attending;
        if (currentFilter === 'no')  return !r.attending;
        return true;
      });

      const tbody = document.getElementById('rsvp-tbody');

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No RSVPs yet.</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(r => `
        <tr>
          <td><strong>${esc(r.name)}</strong></td>
          <td class="hide-mobile">${esc(r.email || '—')}</td>
          <td class="hide-mobile">${esc(r.phone || '—')}</td>
          <td>${r.attending ? r.adult_count : '—'}</td>
          <td class="hide-mobile">${r.attending ? r.child_count : '—'}</td>
          <td><span class="badge ${r.attending ? 'badge-yes' : 'badge-no'}">${r.attending ? 'Attending' : 'Declined'}</span></td>
          <td class="hide-mobile">${new Date(r.created_at).toLocaleDateString()}</td>
        </tr>
      `).join('');
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
  </script>
</body>
</html>
