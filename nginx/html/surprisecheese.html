<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J8DVETW8G"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0J8DVETW8G');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Cheese</title>
    <link rel="stylesheet" href="cyberpunk.css">
    <style>
        .surprise-img {
            width: 90%;
            max-width: 500px;
            height: auto;
            border-radius: 4px;
            border: 1px solid var(--orange);
            box-shadow: 0 0 24px var(--orange-glow), 0 0 60px rgba(255,102,0,0.08);
            display: block;
            margin: 0 auto 28px;
        }
    </style>
</head>
<body>
    <div class="neon-bar"></div>

    <header class="page-header">
        <div class="header-kicker">cheesyman.com</div>
        <h1>SURPRISE CHEESE!!!</h1>
    </header>

    <main class="page-wrap" style="text-align:center; padding-top:40px;">
        <img id="daily-image" src="" alt="Surprise Cheese" class="surprise-img">
        <button class="btn btn-orange" onclick="goBack()">Back to Home</button>
    </main>

    <footer class="page-footer">
        &copy; <span id="currentYear"></span> Cheesyman Inc. All rights reserved.
    </footer>

    <script>
        document.getElementById("currentYear").textContent = new Date().getFullYear();

        const randomImageUrl = localStorage.getItem("randomImage");
        if (randomImageUrl) {
            document.getElementById("daily-image").src = randomImageUrl;
        } else {
            document.getElementById("daily-image").alt = "No image available.";
        }

        function goBack() {
            window.location.href = "cheesyhome.html";
        }
    </script>
</body>
</html>
