<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>We'll Be Back Soon</title>
    <link rel="stylesheet" href="cyberpunk.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        .maint-img {
            max-width: 300px;
            width: 100%;
            height: auto;
            margin: 0 auto 1.5rem auto;
            display: block;
            border-radius: 4px;
            border: 1px solid var(--amber);
            box-shadow: 0 0 20px var(--amber-glow);
        }

        .maint-title {
            font-family: var(--font-display);
            font-size: clamp(18px, 3.5vw, 32px);
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 30px var(--amber), 0 0 60px var(--amber-glow);
            margin-bottom: 16px;
            letter-spacing: 0.05em;
        }

        .maint-text {
            font-family: var(--font-mono);
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 2rem;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <div class="neon-bar" style="position:fixed; top:0; left:0; right:0;"></div>

    <div class="container">
        <img src="https://cheeymanwebsite.blob.core.windows.net/photos/sleepycheese.jpg?sp=r&st=2025-08-19T01:20:34Z&se=2026-08-14T09:35:34Z&spr=https&sv=2024-11-04&sr=b&sig=Ak3cJVfYSS7pUAKK60giwXczo0CPcTG2sEXEDz3HB%2Bg%3D"
             alt="Sleepy Cheese" class="maint-img">
        <div class="maint-title">SHHHHH... THE CHEESE IS SLEEPING!</div>
        <p class="maint-text">
            Don't you fret, cheesyman.com is currently undergoing scheduled maintenance.
            Thank you for your patience — we'll be back on the interwebs shortly.
        </p>
    </div>

    <footer class="page-footer" style="position:fixed; bottom:0; left:0; right:0; margin:0;">
        &copy; <span id="year"></span> Cheesyman Inc. All rights reserved.
    </footer>

    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
</body>
</html>
