<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J8DVETW8G"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0J8DVETW8G');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Football - Cheesy Sports</title>
    <link rel="stylesheet" href="cyberpunk.css">
    <style>
        .search-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
            max-width: 560px;
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .search-row .cy-input { flex: 1; min-width: 160px; }
        .search-row .cy-input-sm { flex: 0 0 90px; }

        .btn-cluster {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="neon-bar"></div>

    <header class="page-header">
        <div class="header-nav">
            <a href="sports.html"      class="btn btn-amber">Back to Sports</a>
            <a href="cheesyhome.html"  class="btn btn-green">Cheesyman Home</a>
        </div>
        <div class="header-kicker">cheesyman.com // sports</div>
        <h1>COLLEGE FOOTBALL</h1>
        <p class="header-sub">Take a look at Cheesyman's favorites or search your own.</p>
    </header>

    <main class="page-wrap" style="padding-top:40px;">

        <div class="section-label">search teams</div>
        <div class="search-row">
            <input type="text"  id="teamSearch" class="cy-input"    placeholder="Search for your team...">
            <input type="text"  id="yearSearch" class="cy-input cy-input-sm" placeholder="Year" value="2025">
            <button onclick="searchTeam()" class="btn btn-orange" style="margin:0;">Search</button>
        </div>

        <div class="section-label" style="margin-top:44px;">cheesyman's teams to watch</div>
        <div class="btn-cluster">
            <a href="team.html?team=Indiana&year=2025"    class="btn btn-blue">Indiana Hoosiers</a>
            <a href="team.html?team=Notre Dame&year=2025" class="btn btn-blue">Notre Dame Fighting Irish</a>
        </div>

    </main>

    <footer class="page-footer">
        &copy; <span id="currentYear"></span> Cheesyman Inc. All rights reserved.
    </footer>

    <script>
        document.getElementById("currentYear").textContent = new Date().getFullYear();

        function searchTeam() {
            const teamName = document.getElementById('teamSearch').value.trim();
            let year = document.getElementById('yearSearch').value.trim();
            if (!year) { year = new Date().getFullYear().toString(); }

            if (teamName && teamName.toLowerCase() === 'purdue') {
                window.location.href = 'potfb.html';
            } else if (teamName) {
                window.location.href = `team.html?team=${encodeURIComponent(teamName)}&year=${encodeURIComponent(year)}`;
            } else {
                alert('Please enter a team name');
            }
        }

        document.getElementById('teamSearch').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { searchTeam(); }
        });
        document.getElementById('yearSearch').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { searchTeam(); }
        });
    </script>
</body>
</html>
