<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0J8DVETW8G"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0J8DVETW8G');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Matchup - Cheesy Sports</title>
    <link rel="stylesheet" href="cyberpunk.css">
    <style>
        /* Injected HTML panels */
        .matchup-header, .history-section, .game-details {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 20px 24px;
            margin: 16px auto;
            max-width: 800px;
            position: relative;
        }
        .matchup-header::before, .matchup-header::after,
        .history-section::before, .history-section::after,
        .game-details::before, .game-details::after {
            content: '';
            position: absolute;
            width: 12px; height: 12px;
            border-style: solid;
        }
        .matchup-header { border-color: var(--blue); box-shadow: 0 0 12px var(--blue-glow); }
        .matchup-header::before { top:-1px; left:-1px; border-width:2px 0 0 2px; border-color:var(--blue); }
        .matchup-header::after  { bottom:-1px; right:-1px; border-width:0 2px 2px 0; border-color:var(--blue); }

        .history-section { border-color: var(--purple); box-shadow: 0 0 12px var(--purple-glow); }
        .history-section::before { top:-1px; left:-1px; border-width:2px 0 0 2px; border-color:var(--purple); }
        .history-section::after  { bottom:-1px; right:-1px; border-width:0 2px 2px 0; border-color:var(--purple); }

        .game-details { border-color: var(--orange); box-shadow: 0 0 12px var(--orange-glow); }
        .game-details::before { top:-1px; left:-1px; border-width:2px 0 0 2px; border-color:var(--orange); }
        .game-details::after  { bottom:-1px; right:-1px; border-width:0 2px 2px 0; border-color:var(--orange); }

        .matchup-header h1 {
            font-family: var(--font-display);
            font-size: clamp(16px, 3.5vw, 28px);
            font-weight: 900;
            color: #fff;
            letter-spacing: 0.06em;
            text-shadow: 0 0 20px var(--blue-glow);
            margin-bottom: 16px;
            text-align: center;
        }

        .team-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin: 16px 0;
        }
        .team-logos img {
            max-width: 100px;
            height: auto;
            filter: drop-shadow(0 0 10px var(--blue-glow));
        }
        .vs-text {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 900;
            color: var(--orange);
            text-shadow: 0 0 10px var(--orange), 0 0 30px var(--orange-glow);
        }

        .history-section h2, .game-details h2 {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            margin: 0 0 16px;
            text-align: center;
        }

        .history-section h3, .game-details h3 {
            font-family: var(--font-display);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            margin: 20px 0 10px;
            text-align: center;
        }

        .history-stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 12px;
            margin: 16px 0;
        }
        .history-stat {
            text-align: center;
            padding: 12px;
            min-width: 120px;
        }
        .history-stat .number {
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 900;
            color: var(--purple);
            text-shadow: 0 0 10px var(--purple), 0 0 30px var(--purple-glow);
            line-height: 1;
        }
        .history-stat .label {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 16px 0;
        }
        .stat-item {
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-left: 3px solid var(--green);
            border-radius: 2px;
        }
        .stat-item strong {
            display: block;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 4px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 400;
        }

        .game-details p {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-dim);
            text-align: center;
            padding: 4px 0;
        }

        .not-played-msg {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-dim);
            text-align: center;
            letter-spacing: 0.06em;
            padding: 16px 0;
        }
        .not-played-msg::before { content: '// '; color: var(--amber); }

        .box-score {
            margin: 12px auto;
            border-collapse: collapse;
            width: 100%;
            max-width: 580px;
        }
        .box-score th, .box-score td {
            border: 1px solid var(--border);
            padding: 8px 10px;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 12px;
        }
        .box-score th {
            background: var(--surface2);
            color: var(--orange);
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .box-score td { color: var(--text); }
        .box-score tr:nth-child(even) td { background: var(--surface2); }

        .game-stats-table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            max-width: 640px;
            margin-left: auto; margin-right: auto;
        }
        .game-stats-table th {
            background: var(--surface2);
            padding: 10px;
            text-align: center;
            border: 1px solid var(--border);
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--orange);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .game-stats-table td {
            padding: 9px 10px;
            border: 1px solid var(--border);
            text-align: center;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text);
        }
        .game-stats-table td:nth-child(2) { color: var(--text-dim); font-size: 11px; letter-spacing: 0.08em; }
        .game-stats-table tr:nth-child(even) td { background: var(--surface2); }
    </style>
</head>
<body>
    <div class="neon-bar"></div>

    <header class="page-header">
        <div class="header-nav">
            <a href="#" id="backButton" class="btn btn-amber">Back to Team</a>
            <a href="cheesyhome.html" class="btn btn-green">Cheesyman Home</a>
        </div>
        <div class="header-kicker">cheesyman.com // sports // cfb</div>
        <h1>GAME MATCHUP</h1>
    </header>

    <main class="page-wrap" style="padding-top:20px;">
        <div id="matchup-content">
            <div class="loading">Loading game matchup information...</div>
        </div>
    </main>

    <footer class="page-footer">
        &copy; <span id="currentYear"></span> Cheesyman Inc. All rights reserved.
    </footer>

    <script>
        document.getElementById("currentYear").textContent = new Date().getFullYear();

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('gameId');
        const team1  = urlParams.get('team1');
        const team2  = urlParams.get('team2');
        const year   = urlParams.get('year');
        const apiURL = '/matchup_api/';

        document.getElementById('backButton').onclick = function(e) {
            e.preventDefault();
            window.history.back();
        };

        if (gameId) {
            getMatchupData(gameId);
        } else {
            document.getElementById('matchup-content').innerHTML =
                '<div class="error">No game specified. Please go back and select a game.</div>';
        }

        async function getMatchupData(gameId) {
            const URL = `${apiURL}${gameId}?team1=${team1}&team2=${team2}&year=${year}`;
            try {
                document.getElementById('matchup-content').innerHTML = '<div class="loading">Loading game matchup information...</div>';
                const response = await fetch(URL);
                if (!response.ok) throw new Error(`API returned ${response.status}: ${response.statusText}`);
                const matchupData = await response.json();
                document.querySelector('title').textContent = `${matchupData.homeTeam} vs ${matchupData.awayTeam} - Cheesy Sports`;
                displayMatchupData(matchupData);
            } catch (error) {
                console.error('Error fetching matchup data:', error);
                document.getElementById('matchup-content').innerHTML = `
                    <div class="error">
                        <strong>Unable to Load Matchup Data</strong><br>
                        We couldn't find information for this game. Please try again.<br>
                        <small>${error.message}</small>
                    </div>
                `;
            }
        }

        function displayMatchupData(matchupData) {
            const historyHtml = `
                <div class="matchup-header">
                    <h1>${matchupData.homeTeam} vs ${matchupData.awayTeam}</h1>
                    <div class="team-logos">
                        <img src="${matchupData.homeTeamLogo}" alt="${matchupData.homeTeam} logo">
                        <span class="vs-text">VS</span>
                        <img src="${matchupData.awayTeamLogo}" alt="${matchupData.awayTeam} logo">
                    </div>
                </div>

                <div class="history-section">
                    <h2>Series History</h2>
                    <div class="history-stats">
                        <div class="history-stat">
                            <div class="number">${matchupData.matchupHistory.gamesPlayed}</div>
                            <div class="label">Total Games</div>
                        </div>
                        <div class="history-stat">
                            <div class="number">${matchupData.matchupHistory.team1 === matchupData.homeTeam.toLowerCase() ? matchupData.matchupHistory.team1wins : matchupData.matchupHistory.team2wins}</div>
                            <div class="label">${matchupData.matchupHistory.team1 === matchupData.homeTeam.toLowerCase() ? matchupData.homeTeam : matchupData.awayTeam} Wins</div>
                        </div>
                        <div class="history-stat">
                            <div class="number">${matchupData.matchupHistory.team1 === matchupData.awayTeam.toLowerCase() ? matchupData.matchupHistory.team2wins : matchupData.matchupHistory.team1wins}</div>
                            <div class="label">${matchupData.matchupHistory.team1 === matchupData.awayTeam.toLowerCase() ? matchupData.awayTeam : matchupData.homeTeam} Wins</div>
                        </div>
                        <div class="history-stat">
                            <div class="number">${matchupData.matchupHistory.ties}</div>
                            <div class="label">Ties</div>
                        </div>
                        <div class="history-stat">
                            <div class="number">${matchupData.matchupHistory.firstgame}</div>
                            <div class="label">First Game</div>
                        </div>
                    </div>
                </div>
            `;

            const gameDetailsHtml = `
                <div class="game-details">
                    <h2>${matchupData.currentSeason} Game Details</h2>
                    ${matchupData.gameCompleted ? `
                        <h3>Final Score</h3>
                        <table class="box-score">
                            <thead><tr><th>Team</th><th>Q1</th><th>Q2</th><th>Q3</th><th>Q4</th><th>Final</th></tr></thead>
                            <tbody>
                                <tr>
                                    <td><strong>${matchupData.homeTeam}</strong></td>
                                    <td>${matchupData.homeLineScores[0] || 0}</td>
                                    <td>${matchupData.homeLineScores[1] || 0}</td>
                                    <td>${matchupData.homeLineScores[2] || 0}</td>
                                    <td>${matchupData.homeLineScores[3] || 0}</td>
                                    <td><strong>${matchupData.homeLineScores.reduce((a,c)=>a+c,0)}</strong></td>
                                </tr>
                                <tr>
                                    <td><strong>${matchupData.awayTeam}</strong></td>
                                    <td>${matchupData.awayLineScores[0] || 0}</td>
                                    <td>${matchupData.awayLineScores[1] || 0}</td>
                                    <td>${matchupData.awayLineScores[2] || 0}</td>
                                    <td>${matchupData.awayLineScores[3] || 0}</td>
                                    <td><strong>${matchupData.awayLineScores.reduce((a,c)=>a+c,0)}</strong></td>
                                </tr>
                            </tbody>
                        </table>
                        <h3>Team Statistics</h3>
                        <table class="game-stats-table">
                            <thead><tr><th>${matchupData.homeTeam}</th><th></th><th>${matchupData.awayTeam}</th></tr></thead>
                            <tbody>
                                <tr><td>${matchupData.homeTeamStats.find(s=>s.category==='totalYards').stat}</td><td>Total Yards</td><td>${matchupData.awayTeamStats.find(s=>s.category==='totalYards').stat}</td></tr>
                                <tr><td>${matchupData.homeTeamStats.find(s=>s.category==='netPassingYards').stat}</td><td>Passing Yards</td><td>${matchupData.awayTeamStats.find(s=>s.category==='netPassingYards').stat}</td></tr>
                                <tr><td>${matchupData.homeTeamStats.find(s=>s.category==='yardsPerPass').stat}</td><td>Yards Per Pass</td><td>${matchupData.awayTeamStats.find(s=>s.category==='yardsPerPass').stat}</td></tr>
                                <tr><td>${matchupData.homeTeamStats.find(s=>s.category==='rushingYards').stat}</td><td>Rushing Yards</td><td>${matchupData.awayTeamStats.find(s=>s.category==='rushingYards').stat}</td></tr>
                                <tr><td>${matchupData.homeTeamStats.find(s=>s.category==='yardsPerRushAttempt').stat}</td><td>Yards Per Rush</td><td>${matchupData.awayTeamStats.find(s=>s.category==='yardsPerRushAttempt').stat}</td></tr>
                                <tr><td>${matchupData.homeTeamStats.find(s=>s.category==='possessionTime').stat}</td><td>Possession Time</td><td>${matchupData.awayTeamStats.find(s=>s.category==='possessionTime').stat}</td></tr>
                                <tr><td>${matchupData.homeTeamStats.find(s=>s.category==='turnovers').stat}</td><td>Turnovers</td><td>${matchupData.awayTeamStats.find(s=>s.category==='turnovers').stat}</td></tr>
                                <tr><td>${matchupData.homeTeamStats.find(s=>s.category==='fumblesLost').stat}</td><td>Fumbles Lost</td><td>${matchupData.awayTeamStats.find(s=>s.category==='fumblesLost').stat}</td></tr>
                                <tr><td>${matchupData.homeTeamStats.find(s=>s.category==='interceptions').stat}</td><td>Interceptions</td><td>${matchupData.awayTeamStats.find(s=>s.category==='interceptions').stat}</td></tr>
                            </tbody>
                        </table>
                    ` : `<p class="not-played-msg">Game has not been played yet. Check back after the game for stats and box score.</p>`}
                </div>
            `;

            document.getElementById('matchup-content').innerHTML = historyHtml + gameDetailsHtml;
        }
    </script>
</body>
</html>
