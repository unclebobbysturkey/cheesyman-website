# Production nginx configuration for cheesyman.com

# cache settings
proxy_cache_path /var/cache/nginx/sports
levels=1:2
keys_zone=sports_cache:10m
max_size=500m
inactive=60m
use_temp_path=off;

# server block for port 80, which will redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    
    server_name cheesyman.com www.cheesyman.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# the main server block
server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;

    server_name cheesyman.com www.cheesyman.com;

    root /usr/share/nginx/html;
    index cheesyhome.html; # defines the "home page"

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/www.cheesyman.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.cheesyman.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # location blocks for the node microsevices
    location /cfb_api/ {

        # Cache configuration
        proxy_cache sports_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;

        #Other proxy settings
        proxy_pass http://cfb_main_app:3001; # sending to node container
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /cbb_api/ {

        # Cache configuration
        proxy_cache sports_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;

        #Other proxy settings
        proxy_pass http://cbb_main_app:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /matchup_api/ {

        # Cache configuration
        proxy_cache sports_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock on;
        
        #Other proxy settings
        add_header X-Cache-Status $upstream_cache_status;
        proxy_pass http://cfb_matchup_app:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /raceschedule/ {

        # Cache configuration
        proxy_cache sports_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock on;
        
        #Other proxy settings
        add_header X-Cache-Status $upstream_cache_status;
        proxy_pass http://race_schedule_app:3004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

# internal only - nginx calls this to check for a valid session before proxying /members
    location = /auth/check {
        internal;
        proxy_pass http://members_auth_app:3005/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # public auth routes - login, logout, callback. No auth_request gate on these
    location /auth {
        proxy_pass http://members_auth_app:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # protected members routes - nginx checks session via auth_request before proxying
    location /members {
        auth_request /auth/check;
        error_page 401 = @login_redirect;
        proxy_pass http://members_auth_app:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # named location for the 401 redirect - not a real route, just a redirect target
    location @login_redirect {
        return 302 /auth/login;
    }

    # Regular file handling for GET/POST/HEAD requests
    location / {
        
    	# Handle OPTIONS requests
        if ($request_method = OPTIONS) {
            add_header Allow "GET, POST, HEAD, OPTIONS";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
	try_files $uri $uri/ =404; # if the GET is not a valid location, return 404 (not found)
    }
}

